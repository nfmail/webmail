name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: "Regenerate visual baselines and upload them as an artifact"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  HUSKY: "0"

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Test repository policy
        run: npm run test:nf

      - name: Validate tracked files
        run: npm run check:nf

      - name: Validate repository settings
        run: npm run check:ruleset

      - name: Test UI conventions check
        run: npm run test:ui-check

      - name: Validate UI conventions
        run: npm run check:ui

  quality:
    name: Typecheck, lint, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and formatting conventions
        run: npm run lint

      # Compiled message catalogs are committed; recompiling must be a no-op,
      # otherwise a .po edit landed without its compiled counterpart.
      - name: i18n catalogs are compiled
        run: npm run check:i18n

      - name: Unit tests
        run: npm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production application
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Run browser smoke tests
        env:
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm start -- --port 3100
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  visual-regression:
    name: Visual regression
    # The ruleset requires PR branches to be up to date, so the squash-merge
    # result is byte-identical to the tested PR head — re-running this
    # expensive suite on the push to main would only re-test the same tree.
    # workflow_dispatch stays enabled for the baseline-regeneration path.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # Compares the committed Linux-rendered baselines against a freshly
      # rendered run. The config (playwright.visual.config.ts) boots its own
      # dev server against the built-in mock JMAP backend, so no separate build
      # or mail server is needed. Snapshots are OS-dependent and the runner is
      # ubuntu, matching the platform the baselines were generated on.
      - name: Run visual regression suite
        if: ${{ github.event.inputs.update_visual_baselines != 'true' }}
        run: npm run test:visual

      # Manual dispatch path: render fresh baselines on the CI platform (the
      # canonical rendering environment) and expose them as an artifact so a
      # maintainer can commit them after review.
      - name: Regenerate visual baselines
        if: ${{ github.event.inputs.update_visual_baselines == 'true' }}
        run: npm run test:visual:update

      - name: Upload regenerated baselines
        if: ${{ github.event.inputs.update_visual_baselines == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines
          path: e2e/visual/__screenshots__/
          retention-days: 7

      # test-results/ holds the actual/expected/diff PNGs and Playwright traces
      # for any surface that drifted, so a red run can be triaged from the
      # artifact without reproducing locally.
      - name: Upload visual diff artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  a11y-scan:
    name: Accessibility scan
    # Same rationale as visual-regression: the up-to-date requirement makes a
    # main-push re-run redundant with the PR run.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # axe-core scans of the key surfaces. The config
      # (playwright.a11y.config.ts) boots its own dev server against the
      # built-in mock JMAP backend, so no separate build or mail server is
      # needed — the same self-contained setup the visual suite uses.
      - name: Run accessibility scan
        run: npm run test:a11y

      # test-results/ holds the axe violation attachments and Playwright traces
      # for any surface with a serious/critical finding, so a red run can be
      # triaged from the artifact without reproducing locally.
      - name: Upload a11y artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11y-scan-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
