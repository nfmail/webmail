name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: "Regenerate visual baselines and upload them as an artifact"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  HUSKY: "0"

jobs:
  repository-policy:
    name: Repository policy
    # Baseline-regeneration dispatches only need the visual job.
    if: ${{ github.event.inputs.update_visual_baselines != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Test repository policy
        run: npm run test:nf

      - name: Validate tracked files
        run: npm run check:nf

      - name: Validate repository settings
        run: npm run check:ruleset

      - name: Test UI conventions check
        run: npm run test:ui-check

      - name: Validate UI conventions
        run: npm run check:ui

  quality:
    name: Typecheck, lint, and unit tests
    # Baseline-regeneration dispatches only need the visual job.
    if: ${{ github.event.inputs.update_visual_baselines != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and formatting conventions
        run: npm run lint

      # Compiled message catalogs are committed; recompiling must be a no-op,
      # otherwise a .po edit landed without its compiled counterpart.
      - name: i18n catalogs are compiled
        run: npm run check:i18n

      - name: Unit tests
        run: npm test

  build:
    name: Production build
    # Baseline-regeneration dispatches only need the visual job.
    if: ${{ github.event.inputs.update_visual_baselines != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      # Gzipped client-JS budgets (total + largest chunk) — catches dependency
      # bloat at PR time; refresh deliberately via check:bundle -- --update.
      - name: Bundle budget
        run: npm run check:bundle

  browser-smoke:
    name: Browser smoke
    # Baseline-regeneration dispatches only need the visual job.
    if: ${{ github.event.inputs.update_visual_baselines != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production application
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Run browser smoke tests
        env:
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm start -- --port 3100
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # Cheap path gate for the expensive browser suites: figure out whether the
  # PR touches anything that can change rendered UI or the suites themselves.
  # Doc/script-only changes skip visual+a11y entirely (a skipped required
  # check counts as passing for the ruleset).
  ui-changes:
    name: UI change detection
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ui: ${{ steps.diff.outputs.ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect UI-relevant changes
        id: diff
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch --quiet origin "${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "$CHANGED"
          PATTERN='^(app/|components/|lib/|stores/|hooks/|i18n/|locales/|public/|e2e/|playwright|proxy\.ts|next\.config\.ts|postcss\.config|package(-lock)?\.json|\.github/workflows/ci\.yml)'
          if echo "$CHANGED" | grep -qE "$PATTERN"; then
            echo "ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui=false" >> "$GITHUB_OUTPUT"
          fi

  visual-regression:
    name: Visual regression
    # The ruleset requires PR branches to be up to date, so the squash-merge
    # result is byte-identical to the tested PR head — re-running this
    # expensive suite on the push to main would only re-test the same tree.
    # On PRs it also skips when no UI-relevant path changed (see ui-changes).
    # workflow_dispatch stays enabled for the baseline-regeneration path.
    needs: ui-changes
    if: >-
      !cancelled() &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && needs.ui-changes.outputs.ui == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      # Tree-hash green marker: if this exact tree content already passed the
      # visual suite (branch update, rebase-only push), skip the re-render —
      # the pixels cannot differ.
      - name: Compute tree hash
        id: tree
        run: echo "hash=$(git rev-parse HEAD^{tree})" >> "$GITHUB_OUTPUT"

      - name: Check green marker
        id: visual-marker
        if: ${{ github.event.inputs.update_visual_baselines != 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .ci-green/visual
          key: visual-green-${{ steps.tree.outputs.hash }}

      - name: Install Chromium
        if: ${{ steps.visual-marker.outputs.cache-hit != 'true' }}
        run: npx playwright install --with-deps chromium

      # The suite runs against a production build (next start): no per-route
      # dev compiles, faster and latency-deterministic. The mock JMAP flags
      # are runtime env, so a plain build works.
      - name: Build production bundle
        if: ${{ steps.visual-marker.outputs.cache-hit != 'true' }}
        run: npm run build

      # Compares the committed Linux-rendered baselines against a freshly
      # rendered run. Snapshots are OS-dependent and the runner is ubuntu,
      # matching the platform the baselines were generated on.
      - name: Run visual regression suite
        if: ${{ github.event.inputs.update_visual_baselines != 'true' && steps.visual-marker.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_VISUAL_WEB_SERVER_COMMAND: npm run start -- --port 3100
        run: npm run test:visual

      - name: Write green marker
        if: ${{ github.event.inputs.update_visual_baselines != 'true' && steps.visual-marker.outputs.cache-hit != 'true' }}
        run: mkdir -p .ci-green && date > .ci-green/visual

      # Manual dispatch path: render fresh baselines on the CI platform (the
      # canonical rendering environment) and expose them as an artifact so a
      # maintainer can commit them after review.
      - name: Regenerate visual baselines
        if: ${{ github.event.inputs.update_visual_baselines == 'true' }}
        env:
          PLAYWRIGHT_VISUAL_WEB_SERVER_COMMAND: npm run start -- --port 3100
        run: npm run build && npm run test:visual:update

      - name: Upload regenerated baselines
        if: ${{ github.event.inputs.update_visual_baselines == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines
          path: e2e/visual/__screenshots__/
          retention-days: 7

      # test-results/ holds the actual/expected/diff PNGs and Playwright traces
      # for any surface that drifted, so a red run can be triaged from the
      # artifact without reproducing locally.
      - name: Upload visual diff artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  a11y-scan:
    name: Accessibility scan
    # Same rationale and gating as visual-regression, except baseline-regen
    # dispatches skip it (only the visual job matters there).
    needs: ui-changes
    if: >-
      !cancelled() &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.update_visual_baselines != 'true') ||
      (github.event_name == 'pull_request' && needs.ui-changes.outputs.ui == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        run: npm run check:toolchain

      - name: Install dependencies
        run: npm ci

      - name: Compute tree hash
        id: tree
        run: echo "hash=$(git rev-parse HEAD^{tree})" >> "$GITHUB_OUTPUT"

      - name: Check green marker
        id: a11y-marker
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .ci-green/a11y
          key: a11y-green-${{ steps.tree.outputs.hash }}

      - name: Install Chromium
        if: ${{ steps.a11y-marker.outputs.cache-hit != 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        if: ${{ steps.a11y-marker.outputs.cache-hit != 'true' }}
        run: npm run build

      # axe-core scans of the key surfaces. The config
      # (playwright.a11y.config.ts) boots its own dev server against the
      # built-in mock JMAP backend, so no separate build or mail server is
      # needed — the same self-contained setup the visual suite uses.
      - name: Run accessibility scan
        if: ${{ steps.a11y-marker.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_A11Y_WEB_SERVER_COMMAND: npm run start -- --port 3100
        run: npm run test:a11y

      - name: Write green marker
        if: ${{ steps.a11y-marker.outputs.cache-hit != 'true' }}
        run: mkdir -p .ci-green && date > .ci-green/a11y

      # test-results/ holds the axe violation attachments and Playwright traces
      # for any surface with a serious/critical finding, so a red run can be
      # triaged from the artifact without reproducing locally.
      - name: Upload a11y artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11y-scan-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
